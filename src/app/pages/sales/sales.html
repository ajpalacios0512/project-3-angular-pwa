<app-navbar></app-navbar>

<section class="page-header">
  <h1>Sales Dashboard</h1>
  <p>This page loads sales data from sales.csv.</p>
</section>

<section class="kpi-section">
  <div class="kpi-card">
    <h2>{{ totalSales }}</h2>
    <p>Total Units Sold</p>
  </div>

  <div class="kpi-card">
    <h2>{{ laptopSales }}</h2>
    <p>Laptops Sold</p>
  </div>

  <div class="kpi-card">
    <h2>{{ headphoneSales }}</h2>
    <p>Headphones Sold</p>
  </div>
</section>

<section class="charts-section">
  <div class="chart-card">
    <h2>Total Monthly Sales</h2>
    <canvas id="salesTotalChart"></canvas>
  </div>

  <div class="chart-card">
    <h2>Product Sales Comparison</h2>
    <canvas id="salesProductChart"></canvas>
  </div>
</section>
